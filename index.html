<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a6b3c">
  <title>Mahjong Scorer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════ MAIN SCREEN -->
<div id="screen-main" class="screen active">
  <header>
    <h1>🀄 Mahjong Scorer</h1>
    <div class="progress-pill">
      <span id="progress-label">0 / 17</span>
    </div>
  </header>

  <!-- Compact Palette -->
  <div class="palette-section">
    <div class="palette-row">
      <span class="suit-pip suit-b">竹</span>
      <div class="tile-grid" id="palette-bamboo"></div>
    </div>
    <div class="palette-row">
      <span class="suit-pip suit-m">萬</span>
      <div class="tile-grid" id="palette-man"></div>
    </div>
    <div class="palette-row">
      <span class="suit-pip suit-p">餅</span>
      <div class="tile-grid" id="palette-pin"></div>
    </div>
    <div class="palette-row">
      <span class="suit-pip suit-z">字</span>
      <div class="tile-grid" id="palette-honor"></div>
    </div>
    <div class="palette-row">
      <span class="suit-pip suit-f">花</span>
      <div class="tile-grid" id="palette-flower"></div>
      <span id="flower-count-badge" class="flower-badge" style="display:none"></span>
    </div>
  </div>

  <!-- Selection hint -->
  <div id="selection-hint" class="selection-hint">
    Tap a tile above, then tap a meld slot below to place it
  </div>

  <!-- Meld Slots -->
  <div class="melds-grid" id="melds-grid"></div>

  <!-- Won From (required, always visible) -->
  <div class="won-from-bar">
    <span class="won-from-label">Winning tile from</span>
    <div class="won-from-btns">
      <button class="won-from-btn" data-value="self">自摸</button>
      <button class="won-from-btn" data-value="z1">東</button>
      <button class="won-from-btn" data-value="z2">南</button>
      <button class="won-from-btn" data-value="z3">西</button>
      <button class="won-from-btn" data-value="z4">北</button>
    </div>
  </div>

  <!-- Win Conditions (collapsible) -->
  <details class="conditions-details" id="conditions-details">
    <summary>Win Conditions <span class="caret">▸</span></summary>
    <div class="conditions-body">

      <div class="condition-row">
        <label>Dealer 庄家?</label>
        <label class="toggle"><input type="checkbox" id="cond-dealer"><span class="toggle-slider"></span></label>
      </div>
      <div class="condition-row" id="streak-row" style="display:none">
        <label>Consecutive dealer wins 連一拉一</label>
        <input type="number" id="cond-dealer-streak" class="number-input" min="0" max="20" value="0">
      </div>

      <div class="condition-row">
        <label>Win type 胡牌方式</label>
        <select id="cond-win-type" class="select-input">
          <option value="normal">Normal</option>
          <option value="yi_du">一獨 — single out (+1)</option>
          <option value="dui_peng">對碰/洞洞 — pung win (+1)</option>
          <option value="du_du">獨獨 — closed/middle/pair wait (+2)</option>
          <option value="qiang_gang">搶槓 — rob the kong (+1)</option>
          <option value="gang_shang_gang">槓上槓 — win on kong draw (+1)</option>
        </select>
      </div>

      <div class="condition-row">
        <label>Instant win 特殊開局</label>
        <select id="cond-instant" class="select-input">
          <option value="none">None</option>
          <option value="tian_ting">天聽 — dealt tenpai (+20)</option>
          <option value="tian_hu">天糊 — dealer wins first draw (+30)</option>
          <option value="di_hu">地糊 — win on dealer's first discard (+40)</option>
        </select>
      </div>

      <div class="condition-row">
        <label>Flowers 花 count</label>
        <input type="number" id="cond-flowers" class="number-input" min="0" max="8" value="0">
      </div>
      <div class="condition-row" id="flower-special-row" style="display:none">
        <label>Flower special 花特殊</label>
        <select id="cond-flower-special" class="select-input">
          <option value="none">None</option>
          <option value="flower_7steal">七搶一 — steal 7th flower (+40)</option>
          <option value="flower_8win">八花 — 7–8 flowers win (+40)</option>
        </select>
      </div>

      <div class="condition-row">
        <label>Wildcards used 寶</label>
        <input type="number" id="cond-wildcards" class="number-input" min="0" max="4" value="0">
      </div>
      <div class="condition-row" id="mo-bao-row" style="display:none">
        <label>Win on wild draw 摸寶?</label>
        <label class="toggle"><input type="checkbox" id="cond-mo-bao"><span class="toggle-slider"></span></label>
      </div>
      <div class="condition-row" id="bao-gui-wei-row" style="display:none">
        <label>Wild as original tile 寶歸位?</label>
        <label class="toggle"><input type="checkbox" id="cond-bao-gui-wei"><span class="toggle-slider"></span></label>
      </div>

      <div class="condition-row">
        <label>Seven pairs 尼故尼故?</label>
        <label class="toggle"><input type="checkbox" id="cond-ni-gu"><span class="toggle-slider"></span></label>
      </div>
    </div>
  </details>

  <div class="step-footer">
    <button id="clear-btn" class="btn-ghost-footer">✕ Clear</button>
    <button id="sample-btn" class="btn-ghost-footer">🎲 Sample</button>
    <button id="calc-btn" class="btn-primary">Calculate →</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ RESULTS SCREEN -->
<div id="screen-results" class="screen">
  <header>
    <button id="back-btn" class="btn-back">← Back</button>
    <div class="step-indicator">Score Results</div>
  </header>

  <div class="results-hero">
    <div class="total-fan-label">Total Fan 番</div>
    <div id="total-fan" class="total-fan-value">0</div>
  </div>

  <div class="results-hand-preview">
    <div id="results-hand-tiles" class="results-tiles"></div>
  </div>

  <div class="results-table-wrap">
    <div class="results-table-header">
      <span>Score Breakdown</span>
      <label class="show-zero-label">
        <input type="checkbox" id="show-zero-rules"> Show all rules
      </label>
    </div>
    <table id="results-table" class="results-table">
      <thead>
        <tr>
          <th>Category</th>
          <th>Rule</th>
          <th class="fan-col">Fan</th>
        </tr>
      </thead>
      <tbody id="results-tbody"></tbody>
    </table>
  </div>

  <div class="step-footer">
    <button id="restart-btn" class="btn-primary">↺ Start Over</button>
  </div>
</div>

<script src="js/tiles.js"></script>
<script src="js/csv-parser.js"></script>
<script src="js/scoring.js"></script>
<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
</body>
</html>
